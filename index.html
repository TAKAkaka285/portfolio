<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>∅ Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#777; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; }

#board {
  position:fixed; inset:0; overflow:hidden;
  background-color:#777;
  background-image:radial-gradient(circle,#ABFF23 1.5px,transparent 1.5px);
  background-size:40px 40px;
}
#world { position:absolute; top:0; left:0; width:8000px; height:8000px; transform-origin:0 0; }
#connections { position:absolute; top:0; left:0; width:8000px; height:8000px; pointer-events:none; }

/* canvas — drawn BEFORE toolbar in HTML so toolbar naturally sits on top */
#draw-canvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; }
body.draw-mode #draw-canvas { pointer-events:all; cursor:crosshair; }

/* notes */
.note { position:absolute; cursor:grab; transform-origin:center; filter:drop-shadow(2px 5px 10px rgba(0,0,0,.3)); transition:filter .15s; }
.note.dragging { filter:drop-shadow(6px 14px 28px rgba(0,0,0,.45))!important; }
.paper { width:100%; min-height:100%; padding:20px 20px 30px; position:relative; z-index:1; }
.note.sh-rect     .paper { border-radius:0; }
.note.sh-square   .paper { border-radius:0; }
.note.sh-rect-r   .paper { border-radius:14px; }
.note.sh-square-r .paper { border-radius:14px; }
.note.sh-square, .note.sh-square-r { width:220px!important; }
.note.sh-square .paper, .note.sh-square-r .paper { min-height:220px; }
.paper::before, .paper::after { content:''; position:absolute; width:10px; height:10px; border-color:rgba(0,0,0,.18); border-style:solid; pointer-events:none; }
.paper::before { top:5px; left:5px; border-width:1.5px 0 0 1.5px; }
.paper::after  { bottom:5px; right:5px; border-width:0 1.5px 1.5px 0; }
.nc-white  .paper { background:#fff; }
.nc-ruled  .paper { background:#fff; background-image:repeating-linear-gradient(transparent,transparent 23px,rgba(80,120,200,.14) 24px); background-size:100% 24px; background-position:0 28px; }
.nc-yellow .paper { background:#f5f0be; }
.nc-pink   .paper { background:#f5c8ce; }
.nc-blue   .paper { background:#c4d8f0; }
.nc-green  .paper { background:#c8e8d0; }
.nc-beige  .paper { background:#e8e4cc; }
.nc-red    .paper { background:#cc0018; }
.nc-navy   .paper { background:#1a2550; }
.deco { position:absolute; pointer-events:none; z-index:2; }
.tape-blue  { width:54px; height:16px; background:rgba(70,155,230,.78); border-radius:2px; }
.tape-kraft { width:50px; height:15px; background:rgba(175,142,85,.76); border-radius:2px; }
.tape-white { width:54px; height:16px; background:rgba(230,228,218,.88); border-radius:2px; }
.tape-short { width:34px!important; }
.pin { width:14px; height:14px; border-radius:50%; box-shadow:0 2px 5px rgba(0,0,0,.38); }
.pin-red    { background:radial-gradient(circle at 38% 35%,#ff9090,#cc0000); }
.pin-silver { background:radial-gradient(circle at 38% 35%,#eee,#888); }
.pin-gold   { background:radial-gradient(circle at 38% 35%,#ffe07a,#b87800); }
.clip-el { width:34px; height:13px; background:linear-gradient(180deg,#ddd,#aaa 50%,#ddd); border:1.5px solid rgba(155,155,170,.9); border-radius:3px; position:relative; }
.clip-el::after { content:''; position:absolute; top:3px; left:5px; right:5px; height:2px; border:1.5px solid rgba(135,135,158,.7); border-radius:2px; }
.note-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.35em; text-transform:uppercase; color:rgba(0,0,0,.35); margin-bottom:10px; display:block; }
.nc-red .note-label, .nc-navy .note-label { color:rgba(255,255,255,.45); }
.note-title { font-size:19px; font-weight:700; line-height:1.1; color:#111; letter-spacing:-.02em; margin-bottom:4px; word-break:break-word; }
.nc-red .note-title, .nc-navy .note-title { color:#fff; }
.note-body { font-size:12px; line-height:1.7; color:#444; display:none; margin-top:10px; word-break:break-word; }
.nc-red .note-body, .nc-navy .note-body { color:rgba(255,255,255,.8); }
.note.expanded .note-body { display:block; }
.note.expanded { width:360px!important; }
.note-close { position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.08); border:none; font-size:10px; cursor:pointer; font-weight:700; display:none; align-items:center; justify-content:center; color:#555; }
.nc-red .note-close, .nc-navy .note-close { background:rgba(255,255,255,.18); color:#fff; }
.note.expanded .note-close { display:flex; }
.note-hint { position:absolute; bottom:8px; left:0; right:0; text-align:center; font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.2em; color:rgba(0,0,0,.18); text-transform:uppercase; }
.note.expanded .note-hint { display:none; }
body.draw-mode .note { pointer-events:none!important; }

.proj-img { width:100%; border-radius:3px; display:block; margin-bottom:12px; }


/* project card inside note-body */
.proj-meta { display:grid; grid-template-columns:auto 1fr; gap:2px 10px; margin-bottom:12px; }
.proj-meta dt { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:rgba(0,0,0,.35); padding-top:1px; }
.proj-meta dd { font-size:11px; color:#222; font-weight:500; }
.proj-url { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.15em; color:#BC2BFF; text-decoration:none; border-bottom:1px solid rgba(188,43,255,.3); margin-bottom:12px; }
.proj-url:hover { border-bottom-color:#BC2BFF; }
.proj-divider { border:none; border-top:1px solid rgba(0,0,0,.08); margin:10px 0; }
.proj-overview { font-size:11px; line-height:1.75; color:#555; }

/* contact form */
.cf { display:flex; flex-direction:column; gap:10px; margin-top:4px; }
.cf-row { display:flex; flex-direction:column; gap:4px; }
.cf-row label { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.25em; text-transform:uppercase; color:rgba(0,0,0,.35); }
.nc-blue .cf-row label { color:rgba(0,0,0,.45); }
.cf-row input, .cf-row textarea {
  width:100%; font-family:'Helvetica Neue',sans-serif; font-size:11px; color:#222;
  background:rgba(255,255,255,.7); border:1.5px solid rgba(0,0,0,.15);
  border-radius:2px; padding:7px 9px; outline:none; resize:vertical;
  transition:border .12s, background .12s;
}
.cf-row input:focus, .cf-row textarea:focus { border-color:#BC2BFF; background:#fff; }
.cf-submit {
  margin-top:4px; padding:9px; border:none; border-radius:2px;
  background:#111; color:#fff; font-family:'Share Tech Mono',monospace;
  font-size:8px; letter-spacing:.25em; text-transform:uppercase;
  cursor:pointer; transition:background .12s;
}
.cf-submit:hover { background:#BC2BFF; }
.cf-sent { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.2em; color:#BC2BFF; text-align:center; padding:12px 0; display:none; }
.cf-sent.show { display:block; }

/* note creation modal */
#note-modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.45); backdrop-filter:blur(2px); }
#note-modal.show { display:flex; }
#note-modal-box { background:#fff; border-radius:4px; border:1.5px solid rgba(0,0,0,.2); box-shadow:6px 6px 0 rgba(0,0,0,.15); width:320px; padding:24px; }
#note-modal-box h3 { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.35em; text-transform:uppercase; color:#999; margin-bottom:18px; }
.nm-row { margin-bottom:14px; }
.nm-row label { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.25em; text-transform:uppercase; color:#aaa; display:block; margin-bottom:5px; }
.nm-row input, .nm-row textarea, .nm-row select { width:100%; font-family:'Helvetica Neue',sans-serif; font-size:12px; color:#222; background:#fafafa; border:1.5px solid #ddd; border-radius:2px; padding:7px 9px; outline:none; transition:border .12s; resize:vertical; }
.nm-row input:focus, .nm-row textarea:focus, .nm-row select:focus { border-color:#BC2BFF; }
.nm-colors { display:flex; gap:6px; flex-wrap:wrap; }
.nm-color { width:26px; height:26px; border-radius:2px; cursor:pointer; border:2px solid transparent; transition:border .1s; }
.nm-color.sel { border-color:#BC2BFF; }
.nm-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.nm-btn { height:34px; padding:0 16px; border:1.5px solid #ddd; border-radius:2px; font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.2em; text-transform:uppercase; cursor:pointer; background:transparent; color:#555; transition:background .12s,color .12s; }
.nm-btn:hover { background:#111; color:#fff; border-color:#111; }
.nm-btn.primary { background:#111; color:#fff; border-color:#111; }
.nm-btn.primary:hover { background:#BC2BFF; border-color:#BC2BFF; }

/* contact form inside note */
.contact-form { margin-top:4px; }
.cf-row { margin-bottom:10px; }
.cf-row label { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.25em; text-transform:uppercase; color:rgba(0,0,0,.35); display:block; margin-bottom:4px; }
.cf-row input, .cf-row textarea { width:100%; font-family:'Helvetica Neue',sans-serif; font-size:11px; color:#222; background:rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.12); border-radius:2px; padding:6px 8px; outline:none; transition:border .12s; resize:none; box-sizing:border-box; }
.cf-row input:focus, .cf-row textarea:focus { border-color:#BC2BFF; background:#fff; }
.cf-submit { width:100%; height:32px; margin-top:4px; background:#111; color:#fff; border:none; border-radius:2px; font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.3em; text-transform:uppercase; cursor:pointer; transition:background .12s; }
.cf-submit:hover { background:#BC2BFF; }
.cf-sent { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.2em; text-align:center; color:#BC2BFF; padding:12px 0 4px; display:none; }

#logo    { position:fixed; top:18px; left:18px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:.35em; text-transform:uppercase; color:#222; background:rgba(255,255,255,.9); padding:6px 14px; border-radius:2px; border:1.5px solid rgba(0,0,0,.2); box-shadow:2px 2px 0 rgba(0,0,0,.1); }
#zoom-hud{ position:fixed; bottom:22px; right:18px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:.18em; color:#222; background:rgba(255,255,255,.9); padding:6px 12px; border-radius:2px; border:1.5px solid rgba(0,0,0,.2); box-shadow:2px 2px 0 rgba(0,0,0,.1); pointer-events:none; }

/* main toolbar */
#toolbar { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); display:flex; align-items:stretch; background:rgba(255,255,255,.95); border-radius:4px; border:1.5px solid rgba(0,0,0,.2); box-shadow:3px 3px 0 rgba(0,0,0,.12); }
.tb-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.28em; color:#999; padding:0 14px; display:flex; align-items:center; border-right:1px solid #ddd; text-transform:uppercase; }
.tb-sep { width:1px; background:#ddd; }
.tb-btn { width:42px; height:40px; border:none; border-right:1px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; background:transparent; color:#333; transition:background .12s,color .12s; }
.tb-btn:hover { background:#111; color:#fff; }
.tb-btn:last-child { border-right:none; }
.tb-btn.on { background:#e8001d!important; color:#fff!important; }

/* draw toolbar — hidden by default, shown via JS style.display */
#draw-toolbar { position:fixed; top:18px; left:50%; transform:translateX(-50%); display:none; align-items:center; background:rgba(255,255,255,.97); border-radius:4px; border:2px solid #e8001d; box-shadow:3px 3px 0 rgba(0,0,0,.15); }
.dt-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.28em; color:#e8001d; font-weight:700; padding:0 14px; display:flex; align-items:center; border-right:1px solid #ddd; text-transform:uppercase; white-space:nowrap; height:44px; }
.dt-swatch { width:32px; height:44px; border-right:1px solid #ddd; flex-shrink:0; position:relative; cursor:pointer; }
.dt-swatch.sel::after { content:''; position:absolute; inset:6px; border:2px solid rgba(0,0,0,.5); border-radius:50%; pointer-events:none; }
.dt-size { display:flex; align-items:center; gap:6px; padding:0 12px; border-right:1px solid #ddd; height:44px; }
.dt-size span { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.2em; color:#999; text-transform:uppercase; white-space:nowrap; }
.dt-size input { width:60px; accent-color:#333; cursor:pointer; }
.dt-btn { height:44px; padding:0 13px; border:none; border-right:1px solid #ddd; background:transparent; cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.18em; color:#555; text-transform:uppercase; transition:background .12s,color .12s; white-space:nowrap; }
.dt-btn:hover { background:#111; color:#fff; }
.dt-btn:last-child { border-right:none; }
.dt-btn.on { background:#555; color:#fff; }
.dt-btn.danger { color:#c00; }
.dt-btn.danger:hover { background:#c00; color:#fff; }
.dt-done { background:#e8001d!important; color:#fff!important; font-weight:700; }
.dt-done:hover { background:#900!important; }

/* cursor */
#cur { position:fixed; pointer-events:none; width:12px; height:12px; border-radius:50%; background:#BC2BFF; transform:translate(-50%,-50%); top:-50px; left:-50px; transition:width .08s,height .08s,background .08s; }
#cur.on-note { background:transparent; width:20px; height:20px; border:2.5px solid #BC2BFF; }

/* ── TURNTABLE ── */
#turntable {
  position:fixed; top:14px; right:14px;
  width:230px;
  border-radius:10px;
  padding:0;
  box-shadow:
    0 12px 48px rgba(0,0,0,.7),
    0 3px 8px rgba(0,0,0,.5),
    0 1px 0 rgba(255,200,60,.15);
  user-select:none;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
  background:#000;
}
/* The entire visual is an inline SVG — see HTML */
#tt-svg-body { display:block; width:100%; }

/* tonearm <g> — CSS transition */
#tt-arm {
  transform-origin: 185px 36px;
  transform: rotate(-32deg);
  transition: transform 1.2s cubic-bezier(.22,1.1,.48,1);
}
#tt-arm.on { transform: rotate(26deg); }

/* spinning disc layer */
#tt-disc-spin {
  transform-origin: 68px 72px;   /* exact platter centre in SVG user units */
}
#tt-disc-spin.spinning { animation: tt-spin 1.8s linear infinite; }
@keyframes tt-spin { to { transform: rotate(360deg); } }


/* ── controls below the SVG ── */
#tt-controls-wrap {
  background: linear-gradient(180deg, #1c1008 0%, #120b04 100%);
  padding: 8px 10px 9px;
  display:flex; flex-direction:column; gap:5px;
  border-top: 1px solid rgba(0,0,0,.8);
}
#tt-info { display:flex; flex-direction:column; gap:2px; }
#tt-track-name {
  font-size:8px; letter-spacing:.16em; text-transform:uppercase;
  color:rgba(255,200,80,.85);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#tt-track-num {
  font-size:6px; letter-spacing:.2em; color:rgba(255,200,80,.35);
}
#tt-controls { display:flex; align-items:center; gap:5px; }
#tt-start {
  background: linear-gradient(180deg,#242424,#141414);
  color:#aaa; border:1px solid #080808; border-radius:3px;
  font-family:'Share Tech Mono',monospace;
  font-size:7px; letter-spacing:.16em; text-transform:uppercase;
  padding:5px 8px; cursor:pointer; flex-shrink:0;
  box-shadow: 0 2px 0 rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
  transition: all .1s;
}
#tt-start:hover  { background:linear-gradient(180deg,#2e2e2e,#1e1e1e); }
#tt-start.on     { color:#ABFF23; text-shadow:0 0 8px rgba(171,255,35,.5); }
.tt-skip {
  width:24px; height:24px; border-radius:50%;
  background:linear-gradient(180deg,#282828,#141414);
  border:1px solid #080808; color:#777; font-size:7px;
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 0 rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
  transition:all .1s;
}
.tt-skip:hover { background:linear-gradient(180deg,#BC2BFF,#8a18bb); border-color:#7010aa; color:#fff; }
#tt-rpm { font-size:6px; letter-spacing:.12em; color:rgba(255,200,80,.2); margin-left:auto; }
#tt-led {
  width:5px; height:5px; border-radius:50%;
  background:#1a1a1a; border:1px solid #080808;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.8);
  transition:all .4s; flex-shrink:0;
}
#tt-led.on {
  background:#ff2020;
  box-shadow: 0 0 6px rgba(255,30,30,.9), 0 0 14px rgba(255,30,30,.4), inset 0 1px 0 rgba(255,100,100,.3);
}
</style>
<body>

<!-- background board -->
<div id="board">
  <div id="world">
    <svg id="connections"></svg>
  </div>
</div>

<!-- draw canvas (before UI elements in DOM) -->
<canvas id="draw-canvas"></canvas>

<!-- UI elements (after canvas = render on top) -->
<div id="logo">∅ Board</div>

<!-- ── Windows XP Idle Alarm ── -->
<!-- turntable widget -->
<div id="turntable">

  <!-- ═══ PHOTOREALISTIC SVG BODY ═══════════════════════════════════════ -->
  <svg id="tt-svg-body" viewBox="0 0 230 148" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- ── Body: amber/gold anodised aluminium ── -->
      <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="#f0b832"/>
        <stop offset="18%"  stop-color="#d4950c"/>
        <stop offset="45%"  stop-color="#b87808"/>
        <stop offset="72%"  stop-color="#9a6206"/>
        <stop offset="100%" stop-color="#7a4c04"/>
      </linearGradient>
      <!-- subtle brushed highlight bands -->
      <pattern id="brushPat" x="0" y="0" width="3" height="230" patternUnits="userSpaceOnUse" patternTransform="rotate(168)">
        <rect width="1" height="230" fill="rgba(255,255,255,.06)"/>
        <rect x="1.5" width=".5" height="230" fill="rgba(0,0,0,.04)"/>
      </pattern>

      <!-- ── Machined aluminium platter ring ── -->
      <radialGradient id="platGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#e8e8e8"/>
        <stop offset="40%"  stop-color="#c0c0c0"/>
        <stop offset="75%"  stop-color="#a8a8a8"/>
        <stop offset="100%" stop-color="#888"/>
      </radialGradient>
      <!-- turning marks conic (lathe finish) -->
      <pattern id="lathePat" x="0" y="0" width="360" height="1" patternUnits="userSpaceOnUse"
               patternTransform="translate(68 68)" patternContentUnits="userSpaceOnUse">
        <!-- rendered as conic in the circle below via SVG -->
      </pattern>

      <!-- ── Vinyl record gradients ── -->
      <radialGradient id="vinylGrad" cx="46%" cy="42%" r="55%">
        <stop offset="0%"   stop-color="#2c2c2c"/>
        <stop offset="35%"  stop-color="#181818"/>
        <stop offset="70%"  stop-color="#0d0d0d"/>
        <stop offset="100%" stop-color="#070707"/>
      </radialGradient>
      <!-- specular gloss highlight on vinyl (top-left catch light) -->
      <radialGradient id="vinylGloss" cx="32%" cy="28%" r="38%">
        <stop offset="0%"  stop-color="rgba(255,255,255,.13)"/>
        <stop offset="60%" stop-color="rgba(255,255,255,.02)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <!-- second gloss opposite corner -->
      <radialGradient id="vinylGloss2" cx="72%" cy="74%" r="30%">
        <stop offset="0%"  stop-color="rgba(255,255,255,.06)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>

      <!-- label gradient: warm amber paper -->
      <radialGradient id="labelGrad" cx="42%" cy="36%" r="62%">
        <stop offset="0%"   stop-color="#e8c060"/>
        <stop offset="30%"  stop-color="#cc9820"/>
        <stop offset="65%"  stop-color="#a07010"/>
        <stop offset="100%" stop-color="#6a4808"/>
      </radialGradient>
      <!-- label paper texture -->
      <filter id="labelTex" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
        <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>
      </filter>

      <!-- spindle hole -->
      <radialGradient id="spindleGrad" cx="35%" cy="32%" r="65%">
        <stop offset="0%"   stop-color="#444"/>
        <stop offset="100%" stop-color="#0a0a0a"/>
      </radialGradient>

      <!-- ── Platter shadow (drop shadow under vinyl) ── -->
      <filter id="platShadow" x="-8%" y="-8%" width="116%" height="116%">
        <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,.75)"/>
      </filter>

      <!-- ── Tonearm housing: dark gunmetal ── -->
      <radialGradient id="housingGrad" cx="38%" cy="32%" r="62%">
        <stop offset="0%"   stop-color="#505050"/>
        <stop offset="45%"  stop-color="#282828"/>
        <stop offset="100%" stop-color="#0e0e0e"/>
      </radialGradient>
      <radialGradient id="bearingGrad" cx="42%" cy="36%" r="58%">
        <stop offset="0%"  stop-color="#5a5a5a"/>
        <stop offset="50%" stop-color="#2a2a2a"/>
        <stop offset="100%" stop-color="#111"/>

function renderBody(body) {
  if (body === '<contact/>') {
    return `<div class="contact-form">
      <div class="cf-row"><label>Name</label><input type="text" id="cf-name" placeholder="Your name"></div>
      <div class="cf-row"><label>Email</label><input type="email" id="cf-email" placeholder="your@email.com"></div>
      <div class="cf-row"><label>Message</label><textarea id="cf-msg" rows="4" placeholder="Tell me about your project..."></textarea></div>
      <button class="cf-submit" onclick="sendContact()">Send Message →</button>
      <div class="cf-sent" id="cf-sent">✓ Sent — I'll get back to you soon.</div>
    </div>`;
  }
  if (!body.includes('<proj>')) return body.replace(/\n/g,'<br>');
  const raw = body.replace('<proj>','').replace('</proj>','');
  // img field may contain base64 with colons — split on | first, then key:value
  const fields = {};
  const parts = raw.split('|');
  parts.forEach(f => {
    const ci = f.indexOf(':');
    if(ci===-1) return;
    const k = f.slice(0,ci).trim();
    const v = f.slice(ci+1).trim();
    fields[k] = v;
  });
  const meta = [
    fields.client  ? ['Client', fields.client]  : null,
    fields.role    ? ['Role',   fields.role]     : null,
    fields.tool    ? ['Tool',   fields.tool]     : null,
    fields.render  ? ['Render', fields.render]   : null,
    fields.period  ? ['Period', fields.period]   : null,
  ].filter(Boolean);
  return `
    ${fields.img ? `<img class="proj-img" src="data:image/jpeg;base64,${fields.img}" alt="project image">` : ''}
    ${fields.url ? `<a class="proj-url" href="${fields.url}" target="_blank" rel="noopener">${fields.url.replace('https://','')}</a>` : ''}
    <dl class="proj-meta">
      ${meta.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('')}
    </dl>
    <hr class="proj-divider">
    <p class="proj-overview">${fields.overview||''}</p>`;
}

function buildNote(d){
  const el=document.createElement('div');
  el.className=`note ${d.nc} ${d.sh||'sh-rect'}`;
  el.id='n-'+d.id;
  el.style.cssText=`left:${d.x}px;top:${d.y}px;transform:rotate(${d.rot}deg);width:230px;position:absolute;z-index:${++topZ};`;
  const deco=DECOS[(d.di||0)%DECOS.length];
  el.innerHTML=`${deco()}
    <div class="paper">
      <span class="note-label">${d.label}</span>
      <div class="note-title" style="font-family:${pickF(d.title)}">${d.title.replace(/\n/g,'<br>')}</div>
      <button class="note-close">✕</button>
      <div class="note-body">${renderBody(d.body)}</div>
      <div class="note-hint">click to open</div>
    </div>`;
  let dragged=false;
  el.addEventListener('mousedown',e=>{
    e.stopPropagation();
    el.style.zIndex=++topZ;
    dragged=false;
    const sx=e.clientX,sy=e.clientY,ox=d.x,oy=d.y;
    const mv=ev=>{const dx=(ev.clientX-sx)/vs,dy=(ev.clientY-sy)/vs;if(Math.abs(dx)>2||Math.abs(dy)>2){dragged=true;el.classList.add('dragging');}d.x=ox+dx;d.y=oy+dy;el.style.left=d.x+'px';el.style.top=d.y+'px';drawConns();};
    const up=()=>{el.classList.remove('dragging');window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  });
  el.addEventListener('click',e=>{
    if(dragged)return;
    if(e.target.closest('.note-close'))return;
    const was=el.classList.contains('expanded');
    document.querySelectorAll('.note.expanded').forEach(n=>n.classList.remove('expanded'));
    if(!was){el.classList.add('expanded');el.style.zIndex=++topZ;}
  });
  el.querySelector('.note-close').addEventListener('click',e=>{e.stopPropagation();el.classList.remove('expanded');});
  worldEl.appendChild(el);
}

// world ↔ screen coordinate helpers
function screenToWorld(sx,sy){ return {x:(sx-vx)/vs, y:(sy-vy)/vs}; }
function worldToScreen(wx,wy){ return {x:wx*vs+vx, y:wy*vs+vy}; }

function paintStroke(pts,preset,size,erase){
  if(pts.length<2)return;
  // convert world coords → screen coords for drawing on fixed canvas
  const sp=pts.map(p=>worldToScreen(p.x,p.y));
  ctx.save();
  if(erase){
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=size*vs*8;ctx.lineCap=ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(sp[0].x,sp[0].y);
    for(let i=1;i<sp.length-1;i++)ctx.quadraticCurveTo(sp[i].x,sp[i].y,(sp[i].x+sp[i+1].x)/2,(sp[i].y+sp[i+1].y)/2);
    ctx.lineTo(sp[sp.length-1].x,sp[sp.length-1].y);ctx.stroke();
  }else{
    const p=PENCIL[preset]||PENCIL['pencil-dark'];
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=`rgb(${p.r},${p.g},${p.b})`;
    ctx.lineWidth=size*vs;ctx.lineCap=ctx.lineJoin='round';ctx.globalAlpha=1;
    ctx.beginPath();ctx.moveTo(sp[0].x,sp[0].y);
    for(let i=1;i<sp.length-1;i++)ctx.quadraticCurveTo(sp[i].x,sp[i].y,(sp[i].x+sp[i+1].x)/2,(sp[i].y+sp[i+1].y)/2);
    ctx.lineTo(sp[sp.length-1].x,sp[sp.length-1].y);ctx.stroke();
  }
  ctx.restore();
}
function redraw(){ctx.clearRect(0,0,canvas.width,canvas.height);strokes.forEach(s=>paintStroke(s.p,s.c,s.s,s.e));}

function playClick(){
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const buf = ac.createBuffer(1, ac.sampleRate*0.06, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 8) * 0.35;
    const src = ac.createBufferSource();
    const gain = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=1800; filt.Q.value=1.2;
    src.buffer=buf; src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(1,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.06);
    src.start();
  } catch(e){}
}

function drawConnsInteractive(){
  svgEl.innerHTML='';
  const C={hero:['about','thought'],about:['works'],thought:['skills'],works:['contact'],skills:['contact']};
  Object.entries(C).forEach(([fid,tids])=>{
    const fd=notes.find(n=>n.id===fid);if(!fd)return;
    tids.forEach(tid=>{
      const td=notes.find(n=>n.id===tid);if(!td)return;
      const ns='http://www.w3.org/2000/svg';
      const p=document.createElementNS(ns,'path');
      const mx=(fd.x+td.x)/2+115, my=(fd.y+td.y)/2+45;
      p.setAttribute('d',`M${fd.x+115},${fd.y+65} Q${mx},${my} ${td.x+115},${td.y+65}`);
      p.setAttribute('fill','none');
      p.setAttribute('stroke','rgba(255,255,255,.25)');
      p.setAttribute('stroke-width','1.5');
      p.setAttribute('stroke-dasharray','5,4');
      p.style.cursor='pointer';
      p.style.transition='stroke .15s';
      // hover
      p.addEventListener('mouseenter',()=>p.setAttribute('stroke','rgba(188,43,255,.7)'));
      p.addEventListener('mouseleave',()=>{if(!p._snapping) p.setAttribute('stroke','rgba(255,255,255,.25)');});
      // snap click
      p.addEventListener('click', ()=>{
        if(p._snapping) return;
        p._snapping = true;
        p.setAttribute('stroke','#BC2BFF');
        p.setAttribute('stroke-width','2.5');
        // spring animation via morphing control point
        let t=0, dir=1;
        const ox=mx, oy=my;
        const snap=()=>{
          t+=0.18*dir;
          const boom=Math.sin(t*Math.PI)*28*Math.exp(-t*1.1);
          p.setAttribute('d',`M${fd.x+115},${fd.y+65} Q${ox},${oy+boom} ${td.x+115},${td.y+65}`);
          if(t<3.5) requestAnimationFrame(snap);
          else {
            p.setAttribute('d',`M${fd.x+115},${fd.y+65} Q${ox},${oy} ${td.x+115},${td.y+65}`);
            p.setAttribute('stroke','rgba(255,255,255,.25)');
            p.setAttribute('stroke-width','1.5');
            p._snapping=false;
          }
        };
        snap();
        // pluck sound
        try {
          const ac=new(window.AudioContext||window.webkitAudioContext)();
          const osc=ac.createOscillator(); const g=ac.createGain();
          osc.type='triangle'; osc.frequency.setValueAtTime(320,ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(120,ac.currentTime+0.4);
          g.gain.setValueAtTime(0.18,ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);
          osc.connect(g); g.connect(ac.destination);
          osc.start(); osc.stop(ac.currentTime+0.5);
        } catch(e){}
      });
      svgEl.appendChild(p);
    });
  });
}

// Override drawConns
drawConns = drawConnsInteractive;
drawConnsInteractive();


// ── TURNTABLE — late-night lo-fi ──────────────────────────────────────────
(function(){
  const disc     = document.getElementById('tt-disc-spin');
  const arm      = document.getElementById('tt-arm');
  const tname    = document.getElementById('tt-track-name');
  const tnum     = document.getElementById('tt-track-num');
  const led      = document.getElementById('tt-led');
  const btnStart = document.getElementById('tt-start');
  const btnPrev  = document.getElementById('tt-prev');
  const btnNext  = document.getElementById('tt-next');

  let playing = false, trackIdx = 0, ac = null, killFns = [];

  // ─────────────────────────────────────────────────
  // TRACK CATALOG
  // 4 moods for late-night study — each with distinct
  // chord colour, tempo, and dominant instrument
  // ─────────────────────────────────────────────────
  const TRACKS = [
    {
      name: 'midnight desk',
      sub:  '— piano · rain',
      bpm:  70,
      // ii–V–I in Eb: Fm7 Bb7 Ebmaj7 Cm7
      prog: [
        { root: 43.65, chord: [1, 1.189, 1.414, 1.682, 2.0 ] }, // Fm7
        { root: 58.27, chord: [1, 1.260, 1.498, 1.782, 2.245] }, // Bb7
        { root: 38.89, chord: [1, 1.260, 1.498, 1.888, 2.245] }, // Ebmaj7
        { root: 32.70, chord: [1, 1.189, 1.414, 1.682, 2.0 ] }, // Cm7
      ],
    },
    {
      name: '3am focus',
      sub:  '— rhodes · vinyl',
      bpm:  66,
      // Dm9 → Gmaj7 → Cmaj9 → Am7
      prog: [
        { root: 36.71, chord: [1, 1.189, 1.414, 1.782, 2.245] }, // Dm9
        { root: 49.00, chord: [1, 1.260, 1.498, 1.888, 2.245] }, // Gmaj7
        { root: 32.70, chord: [1, 1.260, 1.498, 1.888, 2.378] }, // Cmaj9
        { root: 27.50, chord: [1, 1.189, 1.414, 1.682, 2.0 ] }, // Am7
      ],
    },
    {
      name: 'lamp light',
      sub:  '— vibraphone · bass',
      bpm:  74,
      // Abmaj7 → Fm9 → Dbmaj7 → Eb7
      prog: [
        { root: 51.91, chord: [1, 1.260, 1.498, 1.888, 2.245] }, // Abmaj7
        { root: 43.65, chord: [1, 1.189, 1.414, 1.782, 2.245] }, // Fm9
        { root: 34.65, chord: [1, 1.260, 1.498, 1.888, 2.245] }, // Dbmaj7
        { root: 38.89, chord: [1, 1.260, 1.498, 1.782, 2.245] }, // Eb7
      ],
    },
    {
      name: 'last chapter',
      sub:  '— guitar · brush',
      bpm:  78,
      // Gmaj9 → Em7 → Cmaj7 → D7sus4
      prog: [
        { root: 49.00, chord: [1, 1.260, 1.498, 1.888, 2.378] }, // Gmaj9
        { root: 41.20, chord: [1, 1.189, 1.414, 1.682, 2.0 ] }, // Em7
        { root: 32.70, chord: [1, 1.260, 1.498, 1.888, 2.245] }, // Cmaj7
        { root: 36.71, chord: [1, 1.335, 1.498, 1.782, 2.245] }, // D7sus4
      ],
    },
  ];

  // ─────────────────────────────────────────────────
  // AUDIO PRIMITIVES
  // ─────────────────────────────────────────────────
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  // Master bus: gentle tape compression + lo-pass warmth
  function makeBus(ac){
    const lp   = ac.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=3800; lp.Q.value=0.5;
    const hp   = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=60;
    const gain = ac.createGain(); gain.gain.value=0;
    // soft-knee waveshaper (tape saturation feel)
    const ws   = ac.createWaveShaper();
    const n=256; const curve=new Float32Array(n);
    for(let i=0;i<n;i++){ const x=i*2/n-1; curve[i]=x/(1+Math.abs(x)*1.4); }
    ws.curve=curve; ws.oversampleType='4x';
    gain.connect(hp); hp.connect(lp); lp.connect(ws); ws.connect(ac.destination);
    // fade in
    gain.gain.setValueAtTime(0,ac.currentTime);
    gain.gain.linearRampToValueAtTime(0.82,ac.currentTime+1.6);
    return { in: gain, lp };
  }

  // Vinyl crackle + hiss — loops forever
  function makeVinyl(ac,out){
    const sr=ac.sampleRate;
    // 4 seconds of crackle buffer
    const buf=ac.createBuffer(2,sr*4,sr);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<d.length;i++){
        const r=Math.random();
        d[i] = r<0.00035 ? (Math.random()*2-1)*0.7     // big crackle
             : r<0.0012  ? (Math.random()*2-1)*0.2     // small tick
             : (Math.random()*2-1)*0.004;               // hiss floor
      }
    }
    const src=ac.createBufferSource(); src.buffer=buf; src.loop=true;
    const g=ac.createGain(); g.gain.value=0.22;
    const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=4500;
    const f2=ac.createBiquadFilter(); f2.type='highpass'; f2.frequency.value=300;
    src.connect(f); f.connect(f2); f2.connect(g); g.connect(out);
    src.start();
    return ()=>{ try{src.stop();}catch(e){} };
  }

  // Rhodes-like electric piano note
  // Bright "tine" attack that decays into a warm fundamental
  function rhodes(ac,t,freq,dur,vol,out){
    // tine partial (bell-like) at ~5.4× fundamental
    const oTine=ac.createOscillator(); const gTine=ac.createGain();
    oTine.type='sine'; oTine.frequency.value=freq*5.4;
    gTine.gain.setValueAtTime(vol*0.5,t);
    gTine.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    oTine.connect(gTine); gTine.connect(out);
    oTine.start(t); oTine.stop(t+0.22);
    // fundamental with tremolo-like wobble
    const oFund=ac.createOscillator(); const gFund=ac.createGain();
    oFund.type='sine'; oFund.frequency.value=freq;
    // soft LFO
    const lfo=ac.createOscillator(); const lfoG=ac.createGain();
    lfo.type='sine'; lfo.frequency.value=4.8; lfoG.gain.value=vol*0.025;
    lfo.connect(lfoG); lfoG.connect(gFund.gain);
    gFund.gain.setValueAtTime(vol,t);
    gFund.gain.exponentialRampToValueAtTime(vol*0.55,t+0.12);
    gFund.gain.exponentialRampToValueAtTime(0.0001,t+clamp(dur,0.1,2.4));
    oFund.connect(gFund); gFund.connect(out);
    oFund.start(t); oFund.stop(t+clamp(dur,0.1,2.5));
    lfo.start(t); lfo.stop(t+clamp(dur,0.1,2.5));
  }

  // Vibraphone note — sine partials, long metallic ring
  function vibes(ac,t,freq,dur,vol,out){
    const partials=[[1,vol],[2.756,vol*0.25],[5.404,vol*0.07]];
    partials.forEach(([ratio,v])=>{
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type='sine'; o.frequency.value=freq*ratio;
      const dec=ratio===1 ? clamp(dur*1.2,0.4,3.5) : 0.5;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v,t+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dec);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t+dec+0.05);
    });
  }

  // Muted jazz guitar strum — staggered plucks with fast decay
  function guitar(ac,t,freqs,vol,out){
    freqs.forEach((freq,i)=>{
      const delay=i*0.018;
      const o=ac.createOscillator(); const g=ac.createGain();
      const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2200;
      o.type='sawtooth'; o.frequency.value=freq;
      o.detune.value=(Math.random()-0.5)*10;
      g.gain.setValueAtTime(0,t+delay);
      g.gain.linearRampToValueAtTime(vol,t+delay+0.01);
      g.gain.exponentialRampToValueAtTime(vol*0.3,t+delay+0.07);
      g.gain.exponentialRampToValueAtTime(0.0001,t+delay+0.55);
      o.connect(f); f.connect(g); g.connect(out);
      o.start(t+delay); o.stop(t+delay+0.7);
    });
  }

  // Upright bass — warm thump
  function bass(ac,t,freq,dur,vol,out){
    const o=ac.createOscillator(); const g=ac.createGain();
    const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=320;
    o.type='triangle'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.025);
    g.gain.exponentialRampToValueAtTime(vol*0.4,t+0.12);
    g.gain.exponentialRampToValueAtTime(0.0001,t+clamp(dur*0.8,0.1,1.0));
    o.connect(f); f.connect(g); g.connect(out);
    o.start(t); o.stop(t+1.1);
    // body resonance overtone
    const o2=ac.createOscillator(); const g2=ac.createGain();
    o2.type='sine'; o2.frequency.value=freq*2.01;
    g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(vol*0.18,t+0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
    o2.connect(g2); g2.connect(out); o2.start(t); o2.stop(t+0.3);
  }

  // Lo-fi kick — pitch drop sine
  function kick(ac,t,vol,out){
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(130,t);
    o.frequency.exponentialRampToValueAtTime(42,t+0.10);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);
    o.connect(g); g.connect(out); o.start(t); o.stop(t+0.28);
  }

  // Brush snare — bandpass noise, softer than trap
  function brushSnare(ac,t,vol,out){
    const sr=ac.sampleRate; const len=~~(sr*0.16);
    const buf=ac.createBuffer(1,len,sr); const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
    const src=ac.createBufferSource(); src.buffer=buf;
    const g=ac.createGain(); const f=ac.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=1900; f.Q.value=1.0;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    src.connect(f); f.connect(g); g.connect(out); src.start(t);
  }

  // Hi-hat — transient noise burst
  function hat(ac,t,vol,open,out){
    const sr=ac.sampleRate; const dur=open?0.12:0.032;
    const len=~~(sr*dur*2);
    const buf=ac.createBuffer(1,len,sr); const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len, open?1.2:3);
    const src=ac.createBufferSource(); src.buffer=buf;
    const g=ac.createGain(); const f=ac.createBiquadFilter();
    f.type='highpass'; f.frequency.value=7500;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(f); f.connect(g); g.connect(out); src.start(t);
  }

  // Soft room reverb using convolution approximation (two-pass FIR)
  function makeReverb(ac,out){
    const sr=ac.sampleRate; const len=~~(sr*1.8);
    const buf=ac.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.4));
    }
    const conv=ac.createConvolver(); conv.buffer=buf;
    const g=ac.createGain(); g.gain.value=0.18;
    conv.connect(g); g.connect(out);
    return conv; // send to conv.input
  }

  // ─────────────────────────────────────────────────
  // SEQUENCER — schedules one "loop" (~4 bars) ahead
  // ─────────────────────────────────────────────────
  function buildSequencer(ac, trk, bus){
    const beat  = 60/trk.bpm;
    const bar   = beat*4;
    const swing = beat*0.62; // swing 8th-note offset
    const prog  = trk.prog;
    const BARS  = prog.length; // one chord per bar
    let   loopCount = 0;
    let   timerID   = null;
    let   stopped   = false;

    // make reverb send
    const rev=makeReverb(ac,bus.lp);

    function scheduleLoop(startTime){
      if(stopped) return;
      for(let b=0;b<BARS;b++){
        const bt = startTime + b*bar;
        const { root, chord } = prog[b];
        const chordFreqs = chord.map(r=>root*r*2); // ×2 = up an octave into mid range

        // ── CHORD INSTRUMENT (varies by track) ──────────────────
        const BEAT_DUR=bar*0.92;
        if(trackIdx===0){
          // Track 0: Rhodes piano comp on beat 1 + 3
          chordFreqs.forEach(f=>{ rhodes(ac,bt,f,BEAT_DUR*0.48,0.058,rev); rhodes(ac,bt+beat*2,f,BEAT_DUR*0.38,0.044,rev); });
          chordFreqs.forEach(f=>{ rhodes(ac,bt,f,BEAT_DUR*0.48,0.04,bus.in); rhodes(ac,bt+beat*2,f,BEAT_DUR*0.38,0.03,bus.in); });
        } else if(trackIdx===1){
          // Track 1: Rhodes whole bar + soft jazz comp
          chordFreqs.forEach(f=>{ rhodes(ac,bt,f,BEAT_DUR,0.048,rev); rhodes(ac,bt,f,BEAT_DUR,0.034,bus.in); });
          chordFreqs.forEach(f=>{ rhodes(ac,bt+beat,f,beat*0.5,0.022,bus.in); });
        } else if(trackIdx===2){
          // Track 2: Vibraphone — whole bar ring
          chordFreqs.forEach((f,i)=>{ vibes(ac,bt+i*0.025,f,bar*1.1,0.055,rev); vibes(ac,bt+i*0.025,f,bar*1.1,0.038,bus.in); });
        } else {
          // Track 3: Guitar comp — strum on 2 and 4
          guitar(ac,bt+beat,chordFreqs,0.06,rev);
          guitar(ac,bt+beat*3+swing,chordFreqs,0.046,rev);
          guitar(ac,bt+beat,chordFreqs,0.04,bus.in);
          guitar(ac,bt+beat*3+swing,chordFreqs,0.03,bus.in);
        }

        // ── WALKING BASS ─────────────────────────────────────────
        // 4 notes per bar, root + approach notes
        const nextRoot = prog[(b+1)%BARS].root;
        const walkMult=[1, 1.125, 1.25, nextRoot/root];
        walkMult.forEach((m,i)=>bass(ac,bt+beat*i,root*m*0.5,beat*0.85,0.28,bus.in));
        // extra ghost beat on 2+
        bass(ac,bt+beat*1.5,root*1.189*0.5,beat*0.4,0.15,bus.in);

        // ── DRUMS (swing 8th pattern) ─────────────────────────────
        // Kick on 1 and soft on 3
        kick(ac,bt,0.36,bus.in);
        kick(ac,bt+beat*2+swing*0.5,0.18,bus.in);
        // Snare on 2 and 4
        brushSnare(ac,bt+beat,0.18,bus.in);
        brushSnare(ac,bt+beat*3,0.18,bus.in);
        // Hi-hats (swung 8ths)
        for(let h=0;h<8;h++){
          const ht = bt + Math.floor(h/2)*beat + (h%2===0 ? 0 : swing);
          const isDown = h%2===0;
          hat(ac,ht, isDown?0.06:0.034, false, bus.in);
        }
        // Occasional open hi-hat on the + of 4
        hat(ac,bt+beat*3+swing,0.05,true,bus.in);
      }

      loopCount++;
      // schedule next loop 50ms before this one ends
      const loopDur = BARS*bar;
      timerID = setTimeout(()=>scheduleLoop(startTime+loopDur), (loopDur-0.05)*1000);
    }

    // start slightly in the future to avoid timing glitches
    scheduleLoop(ac.currentTime+0.1);

    return ()=>{
      stopped=true;
      if(timerID) clearTimeout(timerID);
    };
  }

  // ─────────────────────────────────────────────────
  // TRANSPORT
  // ─────────────────────────────────────────────────
  function startTrack(){
    ac = new(window.AudioContext||window.webkitAudioContext)();
    const bus = makeBus(ac);
    const stopVinyl = makeVinyl(ac,bus.in);
    const stopSeq   = buildSequencer(ac,TRACKS[trackIdx],bus);
    killFns = [stopVinyl, stopSeq];

    playing=true;
    disc.classList.add('spinning');
    arm.classList.add('on');
    led.classList.add('on');
    btnStart.classList.add('on');
    updateInfo();
  }

  function stopTrack(cb){
    if(!playing){ if(cb)cb(); return; }
    playing=false;
    disc.classList.remove('spinning');
    arm.classList.remove('on');
    led.classList.remove('on');
    btnStart.classList.remove('on');

    // fade out
    if(ac){
      try{
        const g=ac.createGain();
        // can't easily ramp master here — just close after short delay
      }catch(e){}
    }
    killFns.forEach(f=>{try{f();}catch(e){}});
    killFns=[];
    setTimeout(()=>{
      if(ac){try{ac.close();}catch(e){} ac=null;}
      if(cb) cb();
    },300);
  }

  function updateInfo(){
    const t=TRACKS[trackIdx];
    tname.textContent = t.name;
    tnum.textContent  = t.sub;
  }

  btnStart.addEventListener('click',()=>playing?stopTrack():startTrack());
  btnNext.addEventListener('click',()=>{
    const p=playing;
    stopTrack(()=>{ trackIdx=(trackIdx+1)%TRACKS.length; updateInfo(); if(p)startTrack(); });
  });
  btnPrev.addEventListener('click',()=>{
    const p=playing;
    stopTrack(()=>{ trackIdx=(trackIdx-1+TRACKS.length)%TRACKS.length; updateInfo(); if(p)startTrack(); });
  });

  updateInfo();
})();





</script>
